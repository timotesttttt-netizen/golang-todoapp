services:
  todoapp-postgres:
    image: postgres:18.3-bookworm
    container_name: todoapp-env-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - ./out/pgdata:/var/lib/postgresql

    restart: always
  
  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1 # Миграции
    volumes:
      - ${pwd}/migrations:/migrations
    working_dir: /migrations
  port-forwarder:
    image: alpine/socat:1.8.0.3 # socat чтобы не было проблем с портами
    container_name: todoapp-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todoapp-postgres:5432
    ports:
    - "127.0.0.1:5434:5432" # но лучше "127.0.0.1:5432:5432"